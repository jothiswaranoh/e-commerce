<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 4 red squares in 2x2 grid, gap in the middle forming a cross -->
  <rect x="2"  y="2"  width="44" height="44" rx="6" fill="#E8320A"/>
  <rect x="54" y="2"  width="44" height="44" rx="6" fill="#E8320A"/>
  <rect x="2"  y="54" width="44" height="44" rx="6" fill="#E8320A"/>
  <rect x="54" y="54" width="44" height="44" rx="6" fill="#E8320A"/>

  <!-- Black 6-spoke asterisk centered at (50,50), rounded caps -->
  <!-- Vertical spoke -->
  <line x1="50" y1="18" x2="50" y2="82" stroke="black" stroke-width="10" stroke-linecap="round"/>
  <!-- Horizontal spoke -->
  <line x1="18" y1="50" x2="82" y2="50" stroke="black" stroke-width="10" stroke-linecap="round"/>
  <!-- Diagonal TL to BR -->
  <line x1="25" y1="25" x2="75" y2="75" stroke="black" stroke-width="10" stroke-linecap="round"/>
  <!-- Diagonal TR to BL -->
  <line x1="75" y1="25" x2="25" y2="75" stroke="black" stroke-width="10" stroke-linecap="round"/>
</svg>
